swagger: "2.0"
info:
  title: Argent Bank Transactions API
  description: API endpoints for managing bank transactions
  version: "1.0.0"
host: localhost:3001
basePath: /api/v1
schemes:
  - http
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
paths:
  /accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Get all transactions for an account
      description: API for fetching all transactions of a specific account for the current month
      parameters:
        - in: path
          name: accountId
          required: true
          type: string
          description: The account ID
      responses:
        "200":
          description: Transactions retrieved successfully
          schema:
            $ref: "#/definitions/TransactionsResponse"
        "401":
          description: Unauthorized
        "404":
          description: Account not found
        "500":
          description: Internal Server Error
  /accounts/{accountId}/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Get a single transaction
      description: API for fetching a specific transaction by ID
      parameters:
        - in: path
          name: accountId
          required: true
          type: string
          description: The account ID
        - in: path
          name: transactionId
          required: true
          type: string
          description: The transaction ID
      responses:
        "200":
          description: Transaction retrieved successfully
          schema:
            $ref: "#/definitions/TransactionResponse"
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found
        "500":
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Update transaction details
      description: API for updating transaction category and notes
      parameters:
        - in: path
          name: accountId
          required: true
          type: string
          description: The account ID
        - in: path
          name: transactionId
          required: true
          type: string
          description: The transaction ID
        - in: body
          name: body
          required: true
          description: Transaction fields to update
          schema:
            $ref: "#/definitions/TransactionUpdate"
      responses:
        "200":
          description: Transaction updated successfully
          schema:
            $ref: "#/definitions/TransactionResponse"
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found
        "500":
          description: Internal Server Error
definitions:
  Transaction:
    type: object
    properties:
      id:
        type: string
        description: Transaction ID
      date:
        type: string
        description: Transaction date
      description:
        type: string
        description: Transaction description
      amount:
        type: number
        description: Transaction amount
      balance:
        type: number
        description: Account balance after transaction
      type:
        type: string
        description: Transaction type
      category:
        type: string
        description: Transaction category
      notes:
        type: string
        description: Transaction notes
  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
        description: Transaction category
      notes:
        type: string
        description: Transaction notes
  TransactionResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        $ref: "#/definitions/Transaction"
  TransactionsResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          $ref: "#/definitions/Transaction"
