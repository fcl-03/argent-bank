openapi: 3.0.0
info:
  title: Argent Bank Transactions API
  description: API endpoints for managing bank transactions
  version: 1.0.0
servers:
  - url: http://localhost:3001/api/v1

paths:
  /accounts/{accountId}/transactions:
    get:
      summary: Get all transactions for an account
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          description: The account ID
          schema:
            type: string
      responses:
        "200":
          description: Transactions retrieved successfully
        "401":
          description: Unauthorized - Invalid token
        "404":
          description: Account not found
  /accounts/{accountId}/transactions/{transactionId}:
    get:
      summary: Get a single transaction by ID
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          description: The account ID
          schema:
            type: string
        - name: transactionId
          in: path
          required: true
          description: The transaction ID
          schema:
            type: string
      responses:
        "200":
          description: Transaction retrieved successfully
        "401":
          description: Unauthorized - Invalid token
        "404":
          description: Transaction not found
    put:
      summary: Update transaction category and notes
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
                notes:
                  type: string
      responses:
        "200":
          description: Transaction updated successfully
        "401":
          description: Unauthorized - Invalid token
        "404":
          description: Transaction not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
